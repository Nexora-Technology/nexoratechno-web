<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Case Studies — Nexora Technology</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="subpages.css" />
</head>
<body>

<header class="nav-wrap" id="nav">
  <div class="container">
    <nav class="nav">
      <a href="Nexora Website.html#home" class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Nexora<span style="color: var(--accent);">.</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="Nexora Website.html#home" data-i18n="nav_home">Trang chủ</a></li>
        <li><a href="Nexora Website.html#services" data-i18n="nav_services">Dịch vụ</a></li>
        <li><a href="Case Studies.html" class="active">Case Studies</a></li>
        <li><a href="Blog.html">Blog</a></li>
        <li><a href="Careers.html">Careers</a></li>
        <li><a href="Nexora Website.html#contact" data-i18n="nav_contact">Liên hệ</a></li>
      </ul>
      <div class="nav-actions">
        <div class="lang-toggle"><button data-lang="vi">VI</button><button data-lang="en">EN</button></div>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <a href="Nexora Website.html#contact" class="btn btn-primary desktop-cta" data-i18n="nav_cta">Bắt đầu dự án</a>
        <button class="icon-btn mobile-burger" id="burger" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      </div>
    </nav>
  </div>
</header>

<div id="app"></div>

<footer class="footer">
  <div class="container">
    <div class="footer-bot" style="border: 0; padding: 24px 0;">
      <div>© 2026 Nexora Technology.</div>
      <div>17/5 Tân Thuận Tây, TP.HCM · email@nexoratechno.com</div>
    </div>
  </div>
</footer>

<script src="i18n.js"></script>
<script src="data.js"></script>
<script src="subpages.js"></script>
<script>
(function(){
  NX.initSharedChrome();
  const lang = NX.getLang();
  const slug = NX.getSlug();
  const app = document.getElementById('app');
  const cases = window.NEXORA_DATA.cases;

  const STR = {
    vi: { eyebrow:'Case Studies', title:'Những sản phẩm chúng tôi đã đưa ra thị trường.', lead:'Mỗi dự án là một bài toán riêng — với cách tiếp cận riêng. Đây là một số câu chuyện tiêu biểu.', all:'Tất cả', read:'Đọc chi tiết', back:'← Xem tất cả case studies', results:'Kết quả', client:'Khách hàng', industry:'Ngành', duration:'Thời gian', team:'Đội ngũ', services:'Dịch vụ', cta_t:'Bạn có một dự án tương tự?', cta_d:'Kể cho chúng tôi nghe. Cuộc tư vấn đầu tiên miễn phí.', cta_b:'Đặt lịch tư vấn' },
    en: { eyebrow:'Case Studies', title:'Products we shipped.', lead:'Every project is its own problem — with its own approach. A few representative stories.', all:'All', read:'Read case study', back:'← All case studies', results:'Results', client:'Client', industry:'Industry', duration:'Duration', team:'Team', services:'Services', cta_t:'Got a similar project?', cta_d:'Tell us about it. First consultation is free.', cta_b:'Book a call' }
  }[lang];

  const titleOf = c => lang==='vi'?c.title_vi:c.title_en;
  const sumOf = c => lang==='vi'?c.summary_vi:c.summary_en;
  const indOf = c => lang==='vi'?c.industry_vi:c.industry_en;
  const durOf = c => lang==='vi'?c.duration_vi:c.duration_en;

  if (slug) {
    const cs = cases.find(c => c.slug === slug);
    if (!cs) { app.innerHTML = `<div class="container detail-wrap"><p class="empty-state">Not found.</p></div>`; return; }
    const body = lang==='vi'?cs.body_vi:cs.body_en;
    app.innerHTML = `
      <section class="subpage-hero">
        <div class="container subpage-hero-inner">
          <div class="crumb">
            <a href="Nexora Website.html#home">Nexora</a><span class="crumb-sep">/</span>
            <a href="Case Studies.html">${STR.eyebrow}</a><span class="crumb-sep">/</span><span>${cs.client}</span>
          </div>
          <span class="eyebrow">${indOf(cs)} · ${cs.year}</span>
          <h1 class="subpage-title" style="max-width:22ch;">${titleOf(cs)}</h1>
          <p class="subpage-lead">${sumOf(cs)}</p>
        </div>
      </section>

      <div class="container" style="padding-top:60px;">
        <div class="case-hero-visual" style="--case-color:${cs.color};">
          <div class="case-hero-content">
            <div class="case-client">${cs.client}</div>
            <h2>${titleOf(cs)}</h2>
          </div>
        </div>

        <div class="case-facts">
          <div class="case-fact"><div class="case-fact-l">${STR.client}</div><div class="case-fact-v">${cs.client}</div></div>
          <div class="case-fact"><div class="case-fact-l">${STR.industry}</div><div class="case-fact-v">${indOf(cs)}</div></div>
          <div class="case-fact"><div class="case-fact-l">${STR.duration}</div><div class="case-fact-v">${durOf(cs)}</div></div>
          <div class="case-fact"><div class="case-fact-l">${STR.team}</div><div class="case-fact-v">${cs.team}</div></div>
        </div>

        <div class="detail-wrap" style="padding-top:20px;">
          <h2 style="font-size:28px; letter-spacing:-0.02em; margin-bottom:8px;">${STR.results}</h2>
          <div class="case-stats">
            ${cs.metrics.map(m => `
              <div>
                <div class="case-stat-v">${m.v}</div>
                <div class="case-stat-l">${lang==='vi'?m.l_vi:m.l_en}</div>
              </div>
            `).join('')}
          </div>

          <div class="detail-body">
            ${body.map(s => `
              <h2>${s.h}</h2>
              ${s.p ? `<p>${s.p}</p>` : ''}
              ${s.list ? `<ul>${s.list.map(x=>`<li>${x}</li>`).join('')}</ul>` : ''}
            `).join('')}
            <div class="tag-row" style="margin-top:40px;">
              ${cs.services.map(t=>`<span class="tag-pill">${t}</span>`).join('')}
            </div>
          </div>

          <div style="margin-top:40px;"><a href="Case Studies.html" class="btn btn-ghost">${STR.back}</a></div>

          <div class="detail-cta" style="margin-top:56px;">
            <div><h3>${STR.cta_t}</h3><p>${STR.cta_d}</p></div>
            <a href="Nexora Website.html#contact" class="btn btn-accent">${STR.cta_b}
              <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            </a>
          </div>
        </div>
      </div>
    `;
    return;
  }

  // Listing
  const allServices = Array.from(new Set(cases.flatMap(c => c.services)));
  let activeFilter = 'all';

  const render = () => {
    const filtered = activeFilter === 'all' ? cases : cases.filter(c => c.services.includes(activeFilter));
    app.innerHTML = `
      <section class="subpage-hero">
        <div class="container subpage-hero-inner">
          <div class="crumb">
            <a href="Nexora Website.html#home">Nexora</a><span class="crumb-sep">/</span><span>${STR.eyebrow}</span>
          </div>
          <span class="eyebrow">${STR.eyebrow}</span>
          <h1 class="subpage-title" style="margin-top:20px;">${STR.title}</h1>
          <p class="subpage-lead">${STR.lead}</p>
        </div>
      </section>

      <section class="section" style="padding-top:64px;">
        <div class="container">
          <div class="listing-filters" id="f">
            <button data-f="all" class="${activeFilter==='all'?'active':''}">${STR.all}</button>
            ${allServices.map(s => `<button data-f="${s}" class="${activeFilter===s?'active':''}">${s}</button>`).join('')}
          </div>
          <div class="cases-grid">
            ${filtered.map(c => `
              <a class="case-card" href="Case Studies.html?slug=${c.slug}">
                <div class="case-visual" style="--case-color:${c.color};">
                  <div class="case-visual-content">
                    <div>
                      <div class="case-client">${c.client}</div>
                      <div class="case-industry">${indOf(c)}</div>
                    </div>
                    <div class="case-year">${c.year}</div>
                  </div>
                </div>
                <div class="case-body">
                  <h3>${titleOf(c)}</h3>
                  <p>${sumOf(c)}</p>
                  <div class="case-foot">
                    <span>${c.services.slice(0,2).join(' · ')}</span>
                    <strong>${durOf(c)}</strong>
                  </div>
                </div>
              </a>
            `).join('')}
          </div>
        </div>
      </section>
    `;
    document.querySelectorAll('#f button').forEach(b => {
      b.addEventListener('click', () => { activeFilter = b.dataset.f; render(); });
    });
  };
  render();
})();
</script>
</body>
</html>
