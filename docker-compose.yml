version: '3.9'

services:
  wordpress:
    image: wordpress:6.7-php8.3-apache
    container_name: nexora_wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_NAME: nexora_wp
      WORDPRESS_DB_USER: nexora_wp
      WORDPRESS_DB_PASSWORD: nexora_wp_pass
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/wordpress/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nexora_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.4
    container_name: nexora_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nexora_wp
      MYSQL_USER: nexora_wp
      MYSQL_PASSWORD: nexora_wp_pass
      MYSQL_ROOT_PASSWORD: nexora_root_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nexora_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nexora_network:
    driver: bridge

volumes:
  wordpress_data:
  mysql_data:
